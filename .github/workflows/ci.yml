name: CI

on:
  push:
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      - run: |
          for demo in \
            examples/demo_classical_minuet.music \
            examples/demo_jazz_blues.music \
            examples/demo_jazz_complete.music \
            examples/demo_minimal_pulse.music \
            examples/demo_cinematic_ambient.music \
            examples/drum_groove.music
          do
            cargo run -q -p musiclang-cli -- analyze "$demo" --strict
          done
      - run: |
          for demo in \
            examples/demo_classical_minuet.music \
            examples/demo_jazz_blues.music \
            examples/demo_jazz_complete.music \
            examples/demo_minimal_pulse.music \
            examples/demo_cinematic_ambient.music \
            examples/drum_groove.music
          do
            name="$(basename "$demo" .music)"
            cargo run -q -p musiclang-cli -- export "$demo" --format midi -o "/tmp/musiclang-ci-$name.mid" --strict
            cargo run -q -p musiclang-cli -- export "$demo" --format musicxml -o "/tmp/musiclang-ci-$name.musicxml" --strict
            cargo run -q -p musiclang-cli -- export "$demo" --format wav -o "/tmp/musiclang-ci-$name.wav" --strict
          done
